services:
  - type: web
    name: nemoclaw
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    healthCheckPath: /health
    disk:
      name: qdrant-edge-storage
      mountPath: /var/lib/qdrant-edge
      sizeGB: 1
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: NEMOCLAW_MODEL
        value: nvidia/nemotron-3-super-120b-a12b
      - key: NEMOCLAW_PROVIDER
        value: default
      - key: NEMOCLAW_PROVIDER_TYPE
        value: nvidia
      - key: NEMOCLAW_INFERENCE_ENDPOINT
        value: https://integrate.api.nvidia.com/v1
      - key: PORT
        value: "18789"
      - key: QDRANT_URL
        value: http://127.0.0.1:6333
      - key: QDRANT_BRIDGE_PORT
        value: "6333"
      - key: QDRANT_COLLECTION
        value: family_memory
      - key: QDRANT_STORAGE_DIR
        value: /var/lib/qdrant-edge
